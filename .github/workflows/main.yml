name: Build dylib

# Manual trigger only: go to the Actions tab, pick "Build dylib", and click
# "Run workflow". (Also runs on pushes that touch source, which you can remove
# if you only ever want the manual button.)
on:
  workflow_dispatch:
  push:
    paths:
      - "*.m"
      - "*.h"
      - "Makefile"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: Build ZImmortalizerJailed.dylib
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          # Theos bootstrap: clones Theos + its submodules and the iOS SDKs.
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Show toolchain info
        run: |
          echo "THEOS=$THEOS"
          ls "$THEOS/sdks" || (echo "No SDKs found in \$THEOS/sdks" && exit 1)

      - name: Build
        run: |
          make clean || true
          make -j"$(sysctl -n hw.ncpu)"

      - name: Locate built dylib
        id: locate
        run: |
          DYLIB="$(find .theos/obj -name 'ZImmortalizerJailed.dylib' -print -quit)"
          if [ -z "$DYLIB" ]; then
            echo "::error::Build finished but ZImmortalizerJailed.dylib was not found under .theos/obj"
            find .theos -maxdepth 3 -type f | sort
            exit 1
          fi
          echo "Found dylib at $DYLIB"
          echo "dylib_path=$DYLIB" >> "$GITHUB_OUTPUT"

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZImmortalizerJailed-dylib
          path: ${{ steps.locate.outputs.dylib_path }}
          if-no-files-found: error
